services:
  - type: web
    name: collegebuddy-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: alembic upgrade head && gunicorn -k uvicorn.workers.UvicornWorker main:app
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        sync: false # Set this in the Render dashboard (e.g., from Supabase)
      - key: CLOUDINARY_URL
        sync: false # Set this in the Render dashboard
      - key: SECRET_KEY
        generateValue: true
      
